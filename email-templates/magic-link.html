<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自动记账</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #f6f8fb; color: #1f2937; padding: 24px; }
    .card { max-width: 520px; margin: 0 auto; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; }
    .title { font-size: 20px; font-weight: 700; margin: 0 0 12px; }
    .desc { margin: 0 0 16px; color: #4b5563; line-height: 1.6; }
    .button { display: inline-block; padding: 12px 18px; background: #2563eb; color: #ffffff; font-weight: 700; text-decoration: none; border-radius: 10px; }
    .button:hover { background: #1d4ed8; }
    .tip { margin-top: 16px; font-size: 13px; color: #6b7280; }
    .link { word-break: break-all; color: #2563eb; }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">自动记账 - 您已完成注册</h1>
    <p class="desc">您之前已经使用该邮箱完成注册，请点击下方按钮前往登录页面。</p>
    <a class="button" href="{{.RedirectTo}}" target="_blank" rel="noopener">前往登录</a>
    <p class="tip">如果按钮无法点击，请将下方链接复制到浏览器中打开：<br /><span class="link">{{.ConfirmationURL}}</span></p>
  </div>
</body>
</html>
