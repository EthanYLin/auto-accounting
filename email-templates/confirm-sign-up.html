<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自动记账 - 确认注册验证码</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #f6f8fb; color: #1f2937; padding: 24px; }
    .card { max-width: 520px; margin: 0 auto; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; }
    .title { font-size: 20px; font-weight: 700; margin: 0 0 12px; }
    .desc { margin: 0 0 16px; color: #4b5563; line-height: 1.6; }
    .otp { display: inline-block; font-size: 28px; letter-spacing: 6px; font-weight: 800; padding: 12px 16px; background: #f1f5f9; border-radius: 10px; border: 1px dashed #cbd5e1; }
    .tip { margin-top: 16px; font-size: 13px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">自动记账 - 确认注册</h1>
    <p class="desc">请输入下面的验证码完成注册。</p>
    <div class="otp">{{.Token}}</div>
    <p class="tip">如果不是本人操作，请忽略此邮件。</p>
  </div>
</body>
</html>
